<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickBarcode | Generador de códigos de barras</title>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { background:#f0f2f5; display:flex; justify-content:center; padding:20px; }
.container { background:#fff; padding:30px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1); max-width:500px; width:100%; margin-top:30px; text-align:center; }
h1 { text-align:center; margin-bottom:20px; color:#333; }
label { display:block; margin-top:15px; font-weight:600; color:#555; text-align:left; }
input[type="text"], select { width:100%; padding:10px; margin-top:5px; border:1px solid #ccc; border-radius:8px; font-size:16px; }
button { margin-top:20px; width:48%; padding:12px; background-color:#4CAF50; color:white; font-size:16px; font-weight:bold; border:none; border-radius:8px; cursor:pointer; transition:background 0.3s; }
button:hover { background-color:#45a049; }
#barcode { margin-top:25px; }
.button-group { display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-top:15px; }
#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background:#4CAF50; color:white; padding:12px 20px; border-radius:8px; display:none; font-weight:bold; box-shadow:0 4px 10px rgba(0,0,0,0.2); opacity:0; transition:opacity 0.5s; z-index:1000; }
</style>
</head>
<body>
<div class="container">
  <h1 id="title">QuickBarcode</h1>

  <label for="langSelect">Idioma / Language:</label>
  <select id="langSelect">
    <option value="es">Español</option>
    <option value="en">English</option>
  </select>

  <label for="barcodeInput" id="barcodeLabel">Texto o número:</label>
  <input type="text" id="barcodeInput" placeholder="Ej: 123456789012">

  <label for="barcodeType" id="typeLabel">Tipo de código:</label>
  <select id="barcodeType">
    <option value="EAN13">EAN-13</option>
    <option value="CODE128">Code128</option>
    <option value="CODE39">Code39</option>
  </select>

  <div class="button-group">
    <button id="generateBtn">Generar código</button>
    <button id="copyBtn">Copiar PNG</button>
    <button id="pdfBtn">Descargar PDF</button>
  </div>

  <svg id="barcode"></svg>
</div>

<div id="toast"></div>

<script>
const barcodeInput = document.getElementById('barcodeInput');
const barcodeType = document.getElementById('barcodeType');
const generateBtn = document.getElementById('generateBtn');
const copyBtn = document.getElementById('copyBtn');
const pdfBtn = document.getElementById('pdfBtn');
const barcodeSVG = document.getElementById('barcode');
const toast = document.getElementById('toast');
const langSelect = document.getElementById('langSelect');
const barcodeLabel = document.getElementById('barcodeLabel');
const typeLabel = document.getElementById('typeLabel');
const title = document.getElementById('title');

const translations = {
  es: {
    title: "QuickBarcode",
    barcodeLabel: "Texto o número:",
    typeLabel: "Tipo de código:",
    generateBtn: "Generar código",
    copyBtn: "Copiar PNG",
    pdfBtn: "Descargar PDF",
    empty: "Por favor ingresa un valor",
    pdfTitle: "Código de barras"
  },
  en: {
    title: "QuickBarcode",
    barcodeLabel: "Text or number:",
    typeLabel: "Barcode type:",
    generateBtn: "Generate code",
    copyBtn: "Copy PNG",
    pdfBtn: "Download PDF",
    empty: "Please enter a value",
    pdfTitle: "Barcode"
  }
};

function updateLanguage(lang){
  const t = translations[lang];
  title.textContent = t.title;
  barcodeLabel.textContent = t.barcodeLabel;
  typeLabel.textContent = t.typeLabel;
  generateBtn.textContent = t.generateBtn;
  copyBtn.textContent = t.copyBtn;
  pdfBtn.textContent = t.pdfBtn;
}
langSelect.addEventListener('change',()=>updateLanguage(langSelect.value));
updateLanguage('es');

function showToast(msg){
  toast.textContent=msg;
  toast.style.display='block';
  toast.style.opacity=1;
  setTimeout(()=>{toast.style.opacity=0;},2000);
  setTimeout(()=>{toast.style.display='none';},2500);
}

function generateBarcode(){
  const value = barcodeInput.value.trim();
  const type = barcodeType.value;
  const lang = langSelect.value;
  if(!value){ showToast(translations[lang].empty); return; }
  JsBarcode(barcodeSVG, value, {format:type, displayValue:true, fontSize:16, width:2, height:60, margin:10});
}

function copyPNG(){
  const svgData = new XMLSerializer().serializeToString(barcodeSVG);
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  const img = new Image();
  const svgBlob = new Blob([svgData], {type:"image/svg+xml;charset=utf-8"});
  const url = URL.createObjectURL(svgBlob);
  img.onload = function(){
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img,0,0);
    canvas.toBlob(function(blob){
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download="barcode.png";
      a.click();
      URL.revokeObjectURL(a.href);
    });
    URL.revokeObjectURL(url);
  };
  img.src = url;
  showToast(langSelect.value==="es"?"PNG copiado":"PNG copied");
}

function downloadPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const svgData = new XMLSerializer().serializeToString(barcodeSVG);
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  const img = new Image();
  const svgBlob = new Blob([svgData], {type:"image/svg+xml;charset=utf-8"});
  const url = URL.createObjectURL(svgBlob);
  img.onload = function(){
    canvas.width = img.width*2;
    canvas.height = img.height*2;
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    const imgData = canvas.toDataURL("imagePNG");
    const lang = langSelect.value;
    const t = translations[lang];
    doc.setFontSize(22);
    doc.text(t.pdfTitle, 105, 20, null,null,"center");
    doc.addImage(imgData, 'PNG', 35, 40, 140, 40);
    doc.save("barcode.pdf");
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

generateBtn.addEventListener('click',generateBarcode);
copyBtn.addEventListener('click',copyPNG);
pdfBtn.addEventListener('click',downloadPDF);
</script>
</body>
</html>
