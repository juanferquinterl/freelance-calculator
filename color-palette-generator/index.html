<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Palette Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { background:#f0f2f5; display:flex; justify-content:center; padding:20px; }
.container { background:#fff; padding:30px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1); max-width:600px; width:100%; margin-top:30px; }
h1 { text-align:center; margin-bottom:20px; color:#333; }
label { display:block; margin-top:15px; font-weight:600; color:#555; }
input[type="color"], input[type="text"], select { width:100%; padding:10px; margin-top:5px; border:1px solid #ccc; border-radius:8px; font-size:16px; }
.button-group { display:flex; justify-content:space-between; margin-top:15px; flex-wrap:wrap; gap:10px; }
button { flex:1; min-width:48%; padding:12px; background-color:#4CAF50; color:white; font-size:16px; font-weight:bold; border:none; border-radius:8px; cursor:pointer; transition:background 0.3s; }
button:hover { background-color:#45a049; }
.palette-container { margin-top:20px; display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
.color-block { width:80px; height:80px; border-radius:8px; position:relative; cursor:pointer; display:flex; align-items:flex-end; justify-content:center; color:white; font-weight:bold; font-size:12px; padding-bottom:5px; box-shadow:0 3px 10px rgba(0,0,0,0.2); }
#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background:#4CAF50; color:white; padding:12px 20px; border-radius:8px; display:none; font-weight:bold; box-shadow:0 4px 10px rgba(0,0,0,0.2); opacity:0; transition:opacity 0.5s; z-index:1000; }
</style>
</head>
<body>

<div class="container">
  <h1>Color Palette Generator</h1>

  <label for="langSelect">Idioma / Language:</label>
  <select id="langSelect">
    <option value="es">Español</option>
    <option value="en">English</option>
  </select>

  <label id="colorLabel" for="baseColor">Color base:</label>
  <input type="color" id="baseColor" value="#3498db">
  <input type="text" id="hexInput" value="#3498db" placeholder="#3498db" style="margin-top:10px;">

  <label id="schemeLabel" for="scheme">Esquema de colores:</label>
  <select id="scheme">
    <option value="complementary">Complementario</option>
    <option value="analogous">Análogo</option>
    <option value="triadic">Triádico</option>
    <option value="tetradic">Tetrádico</option>
  </select>

  <div class="button-group">
    <button id="generateBtn">Generar paleta</button>
    <button id="copyBtn">Copiar códigos</button>
    <button id="pdfBtn">Descargar PDF</button>
    <button id="pngBtn">Descargar PNG</button>
  </div>

  <div class="palette-container" id="palette"></div>
</div>

<div id="toast"></div>

<script>
// traducciones
const translations = {
  es:{
    colorLabel:"Color base",
    scheme:"Esquema de colores",
    generateBtn:"Generar paleta",
    copyBtn:"Copiar códigos",
    pdfBtn:"Descargar PDF",
    pngBtn:"Descargar PNG",
    copyAlert:"Códigos copiados al portapapeles",
    paletteTitle:"Paleta de colores"
  },
  en:{
    colorLabel:"Base color",
    scheme:"Color scheme",
    generateBtn:"Generate palette",
    copyBtn:"Copy codes",
    pdfBtn:"Download PDF",
    pngBtn:"Download PNG",
    copyAlert:"Codes copied to clipboard",
    paletteTitle:"Color Palette"
  }
};

const langSelect = document.getElementById('langSelect');
const colorLabel = document.getElementById('colorLabel');
const schemeLabel = document.getElementById('schemeLabel');
const generateBtn = document.getElementById('generateBtn');
const copyBtn = document.getElementById('copyBtn');
const pdfBtn = document.getElementById('pdfBtn');
const pngBtn = document.getElementById('pngBtn');

function updateLanguage(lang){
  const t = translations[lang];
  colorLabel.textContent = t.colorLabel;
  schemeLabel.textContent = t.scheme;
  generateBtn.textContent = t.generateBtn;
  copyBtn.textContent = t.copyBtn;
  pdfBtn.textContent = t.pdfBtn;
  pngBtn.textContent = t.pngBtn;
}
langSelect.addEventListener('change',()=>updateLanguage(langSelect.value));
updateLanguage('es');

// Toast
const toast = document.getElementById('toast');
function showToast(message){
  toast.textContent = message;
  toast.style.display='block';
  toast.style.opacity=1;
  setTimeout(()=>{toast.style.opacity=0;},2000);
  setTimeout(()=>{toast.style.display='none';},2500);
}

// utils
function hexToRgb(hex){let r=parseInt(hex.slice(1,3),16); let g=parseInt(hex.slice(3,5),16); let b=parseInt(hex.slice(5,7),16); return [r,g,b];}
function rgbToHex(r,g,b){return "#"+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}

// HSL conversion
function rgbToHsl(r,g,b){r/=255; g/=255; b/=255; let max=Math.max(r,g,b), min=Math.min(r,g,b); let h,s,l=(max+min)/2; if(max==min){h=s=0;}else{let d=max-min; s=l>0.5?d/(2-max-min):d/(max+min); switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break;} h*=60;} return [h,s,l];}
function hslToHex(h,s,l){let c=(1-Math.abs(2*l-1))*s; let x=c*(1-Math.abs((h/60)%2-1)); let m=l-c/2; let r1,g1,b1;if(h<60){r1=c; g1=x; b1=0;}else if(h<120){r1=x; g1=c; b1=0;}else if(h<180){r1=0; g1=c; b1=x;}else if(h<240){r1=0; g1=x; b1=c;}else if(h<300){r1=x; g1=0; b1=c;}else{r1=c; g1=0; b1=x;} let r=Math.round((r1+m)*255); let g=Math.round((g1+m)*255); let b=Math.round((b1+m)*255); return rgbToHex(r,g,b);}

// palette generation
function generateScheme(baseHex, type){
  let rgb = hexToRgb(baseHex);
  let hsl = rgbToHsl(...rgb);
  let palette = [];
  switch(type){
    case "complementary": palette.push(baseHex); palette.push(hslToHex((hsl[0]+180)%360,hsl[1],hsl[2])); break;
    case "analogous": palette.push(baseHex); palette.push(hslToHex((hsl[0]+30)%360,hsl[1],hsl[2])); palette.push(hslToHex((hsl[0]+330)%360,hsl[1],hsl[2])); break;
    case "triadic": palette.push(baseHex); palette.push(hslToHex((hsl[0]+120)%360,hsl[1],hsl[2])); palette.push(hslToHex((hsl[0]+240)%360,hsl[1],hsl[2])); break;
    case "tetradic": palette.push(baseHex); palette.push(hslToHex((hsl[0]+90)%360,hsl[1],hsl[2])); palette.push(hslToHex((hsl[0]+180)%360,hsl[1],hsl[2])); palette.push(hslToHex((hsl[0]+270)%360,hsl[1],hsl[2])); break;
  }
  return palette;
}

// DOM elements
const baseColor = document.getElementById('baseColor');
const hexInput = document.getElementById('hexInput');
const schemeSelect = document.getElementById('scheme');
const paletteDiv = document.getElementById('palette');

function renderPalette(){
  let base = hexInput.value;
  let scheme = schemeSelect.value;
  let palette = generateScheme(base,scheme);
  paletteDiv.innerHTML="";
  palette.forEach(color=>{
    const div = document.createElement('div');
    div.className="color-block";
    div.style.background=color;
    div.textContent=color.toUpperCase();
    div.addEventListener('click',()=>{navigator.clipboard.writeText(color).then(()=>showToast(translations[langSelect.value].copyAlert));});
    paletteDiv.appendChild(div);
  });
  return palette;
}

// sincronizar color picker y hex input
baseColor.addEventListener('input',()=>{hexInput.value=baseColor.value; renderPalette();});
hexInput.addEventListener('input',()=>{baseColor.value=hexInput.value; renderPalette();});

generateBtn.addEventListener('click', renderPalette);
copyBtn.addEventListener('click', ()=>{
  const colors = Array.from(paletteDiv.children).map(div=>div.textContent).join('\n');
  navigator.clipboard.writeText(colors).then(()=>showToast(translations[langSelect.value].copyAlert));
});

// PDF download
pdfBtn.addEventListener('click',()=>{
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:"landscape" });
  const palette = renderPalette();
  const t = translations[langSelect.value];

  doc.setFontSize(22);
  doc.text(t.paletteTitle, 105, 20, null, null, "center");

  palette.forEach((color,i)=>{
    doc.setFillColor(color);
    doc.rect(20+i*50, 40, 40, 40, "F");
    doc.setTextColor(0,0,0);
    doc.setFontSize(10);
    doc.text(color.toUpperCase(), 20+i*50, 90);
  });

  doc.save(`${t.paletteTitle}.pdf`);
});

// PNG download
pngBtn.addEventListener('click',()=>{
  const palette = renderPalette();
  const canvas = document.createElement('canvas');
  canvas.width = palette.length*100;
  canvas.height = 100;
  const ctx = canvas.getContext("2d");

  palette.forEach((color,i)=>{
    ctx.fillStyle = color;
    ctx.fillRect(i*100,0,100,100);
    ctx.fillStyle = "#000";
    ctx.font="12px Arial";
    ctx.fillText(color.toUpperCase(), i*100+5,95);
  });

  const link = document.createElement('a');
  link.download = "palette.png";
  link.href = canvas.toDataURL();
  link.click();
});

// inicial
renderPalette();
</script>

</body>
</html>
