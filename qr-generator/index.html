<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator | My Web Tools</title>
<meta name="description" content="Generate QR codes instantly. Free online QR code generator with options for size and download.">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { background:#f4f6f8; display:flex; justify-content:center; align-items:flex-start; min-height:100vh; padding:40px 20px; }
.container { background:white; padding:40px 35px; border-radius:12px; box-shadow:0 15px 40px rgba(0,0,0,0.1); width:400px; max-width:100%; text-align:center; }
h1 { margin-bottom:25px; color:#333; text-align:center; }
input, button, select { width:100%; padding:12px; margin:8px 0; border-radius:8px; border:1px solid #ccc; font-size:16px; }
input:focus, select:focus { outline:none; border-color:#4CAF50; box-shadow:0 0 5px rgba(76,175,80,0.3); }
button { background:#4CAF50; color:white; border:none; cursor:pointer; font-weight:bold; margin-top:15px; transition:0.3s; }
button:hover { background:#43a047; }
#downloadButton { background:#2196F3; margin-top:10px; }
#downloadButton:hover { background:#1e88e5; }
#qrcode { margin:20px auto; display:flex; justify-content:center; }
.language-select { text-align:right; margin-bottom:20px; }
.footer { text-align:center; margin-top:25px; font-size:12px; color:#777; }
#toast { position:fixed; bottom:25px; left:50%; transform:translateX(-50%); background:#333; color:white; padding:12px 20px; border-radius:8px; font-size:14px; opacity:0; pointer-events:none; transition:opacity 0.4s, transform 0.4s; z-index:1000; }
#toast.show { opacity:1; transform:translate(-50%,-10px); }
</style>
</head>

<body>
<div class="container">
  <div class="language-select">
    <select id="language" onchange="setLanguage()">
      <option value="en">English</option>
      <option value="es">Español</option>
    </select>
  </div>

  <h1 id="title">QR Code Generator</h1>

  <label id="labelText">Enter text or URL</label>
  <input type="text" id="text" placeholder="https://example.com">

  <label id="labelSize">QR Code size (px)</label>
  <input type="number" id="size" value="200" min="50" max="500">

  <button id="generateButton" onclick="generateQR()">Generate QR Code</button>

  <div id="qrcode"></div>

  <button id="downloadButton" onclick="downloadQR()" style="display:none;">Download QR</button>

  <div class="footer" id="footerText">Free online QR Code Generator</div>
</div>

<div id="toast"></div>

<script>
let qr;
let lang = "en";

function generateQR() {
  let text = document.getElementById("text").value.trim();
  let size = parseInt(document.getElementById("size").value);
  if(!text){
    showToast(lang==="es"?"Por favor ingresa un texto o URL":"Please enter text or URL");
    return;
  }
  document.getElementById("qrcode").innerHTML = "";
  qr = new QRCode(document.getElementById("qrcode"), { text, width:size, height:size });
  document.getElementById("downloadButton").style.display = "block";
}

function downloadQR() {
  if(!qr) return;
  let img = document.querySelector("#qrcode img");
  if(img){
    let link = document.createElement("a");
    link.href = img.src;
    link.download = "qrcode.png";
    link.click();
  } else showToast(lang==="es"?"Error al generar QR":"Error generating QR");
}

function setLanguage() {
  lang = document.getElementById("language").value;
  localStorage.setItem("lang", lang);
  if(lang==="es"){
    document.getElementById("title").innerText = "Generador de QR";
    document.getElementById("labelText").innerText = "Ingresa texto o URL";
    document.getElementById("labelSize").innerText = "Tamaño del QR (px)";
    document.getElementById("generateButton").innerText = "Generar QR";
    document.getElementById("downloadButton").innerText = "Descargar QR";
    document.getElementById("footerText").innerText = "Generador de QR gratuito en línea";
  } else {
    document.getElementById("title").innerText = "QR Code Generator";
    document.getElementById("labelText").innerText = "Enter text or URL";
    document.getElementById("labelSize").innerText = "QR Code size (px)";
    document.getElementById("generateButton").innerText = "Generate QR Code";
    document.getElementById("downloadButton").innerText = "Download QR";
    document.getElementById("footerText").innerText = "Free online QR Code Generator";
  }
}

function showToast(message){
  let toast = document.getElementById("toast");
  toast.innerText = message;
  toast.classList.add("show");
  setTimeout(()=>{toast.classList.remove("show");},2000);
}

window.onload = function(){
  let savedLang = localStorage.getItem("lang");
  if(savedLang){
    document.getElementById("language").value = savedLang;
    setLanguage();
  }
};
</script>
</body>
</html>
