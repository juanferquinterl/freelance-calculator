<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastInvoice | My Web Tools</title>
<meta name="description" content="Generate professional invoices in PDF with optional tax and notes. Free online invoice generator.">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { background:#f4f6f8; display:flex; justify-content:center; align-items:flex-start; padding:40px 20px; min-height:100vh; }
.container { background:white; padding:40px 30px; border-radius:12px; box-shadow:0 15px 40px rgba(0,0,0,0.1); width:500px; max-width:100%; }
h1 { text-align:center; margin-bottom:25px; color:#333; }
label { display:block; margin-top:15px; font-weight:600; color:#555; }
input[type=text], input[type=number], textarea, select { width:100%; padding:12px; margin-top:5px; border:1px solid #ccc; border-radius:8px; font-size:16px; }
textarea { resize:vertical; min-height:60px; }
.button-group { display:flex; justify-content:space-between; margin-top:20px; flex-wrap:wrap; gap:10px; }
button { flex:1; min-width:48%; padding:12px; background-color:#4CAF50; color:white; font-size:16px; font-weight:bold; border:none; border-radius:8px; cursor:pointer; transition:background 0.3s; }
button:hover { background-color:#45a049; }
.footer { text-align:center; margin-top:25px; font-size:12px; color:#777; }
.language-select { text-align:right; margin-bottom:15px; }
#toast { position: fixed; bottom: 25px; left: 50%; transform:translateX(-50%); background:#333; color:white; padding:12px 20px; border-radius:8px; font-size:14px; opacity:0; pointer-events:none; transition:opacity 0.4s, transform 0.4s; z-index:1000; }
#toast.show { opacity:1; transform:translate(-50%,-10px); }
</style>
</head>

<body>
<div class="container">
  <div class="language-select">
    <select id="langSelect" onchange="updateLanguage()">
      <option value="es">Español</option>
      <option value="en">English</option>
    </select>
  </div>

  <h1 id="title">FastInvoice</h1>

  <label id="sellerLabel">Vendedor / Seller</label>
  <input type="text" id="seller" placeholder="Ej: JuanFerQuinterl">

  <label id="clientLabel">Nombre del cliente / Client name</label>
  <input type="text" id="client" placeholder="Ej: Juan Pérez">

  <label id="dateLabel">Fecha / Date</label>
  <input type="text" id="date" placeholder="DD/MM/YYYY">

  <label id="itemLabel">Producto / Servicio / Product or Service</label>
  <input type="text" id="item" placeholder="Ej: Diseño web">

  <label id="quantityLabel">Cantidad / Quantity</label>
  <input type="number" id="quantity" value="1" min="1">

  <label id="priceLabel">Precio unitario / Unit price</label>
  <input type="number" id="price" value="0" min="0">

  <label id="ivaLabel">Incluir IVA 21% / Include Tax 21%</label>
  <input type="checkbox" id="iva" checked>

  <label id="notesLabel">Notas / Observaciones / Notes</label>
  <textarea id="notes" placeholder="Opcional / Optional"></textarea>

  <div class="button-group">
    <button id="generateBtn">Generar PDF / Generate PDF</button>
    <button id="copyBtn">Copiar datos / Copy data</button>
  </div>

  <div class="footer">&copy; 2026 JuanFerQuinterl | Free web tools</div>
</div>

<div id="toast"></div>

<script>
const translations = {
  es: {
    seller:"Vendedor",
    client:"Nombre del cliente",
    date:"Fecha",
    item:"Producto / Servicio",
    quantity:"Cantidad",
    price:"Precio unitario",
    iva:"Incluir IVA 21%",
    notes:"Notas / Observaciones",
    generateBtn:"Generar PDF",
    copyBtn:"Copiar datos",
    copyAlert:"Datos copiados al portapapeles",
    invalid:"Por favor completa todos los campos requeridos.",
    invoiceTitle:"Factura",
    subtotal:"Subtotal",
    tax:"IVA 21%",
    total:"Total",
    signatureSeller:"Firma del vendedor",
    signatureClient:"Firma del comprador"
  },
  en: {
    seller:"Seller",
    client:"Client name",
    date:"Date",
    item:"Product / Service",
    quantity:"Quantity",
    price:"Unit price",
    iva:"Include Tax 21%",
    notes:"Notes / Remarks",
    generateBtn:"Generate PDF",
    copyBtn:"Copy data",
    copyAlert:"Data copied to clipboard",
    invalid:"Please fill in all required fields.",
    invoiceTitle:"Invoice",
    subtotal:"Subtotal",
    tax:"Tax 21%",
    total:"Total",
    signatureSeller:"Seller signature",
    signatureClient:"Client signature"
  }
};

function showToast(msg){
  const toast=document.getElementById('toast');
  toast.textContent=msg;
  toast.classList.add('show');
  setTimeout(()=>{toast.classList.remove('show');},2000);
}

function updateLanguage(){
  const lang=document.getElementById('langSelect').value;
  const t=translations[lang];
  document.getElementById('sellerLabel').textContent=t.seller;
  document.getElementById('clientLabel').textContent=t.client;
  document.getElementById('dateLabel').textContent=t.date;
  document.getElementById('itemLabel').textContent=t.item;
  document.getElementById('quantityLabel').textContent=t.quantity;
  document.getElementById('priceLabel').textContent=t.price;
  document.getElementById('ivaLabel').textContent=t.iva;
  document.getElementById('notesLabel').textContent=t.notes;
  document.getElementById('generateBtn').textContent=t.generateBtn;
  document.getElementById('copyBtn').textContent=t.copyBtn;
  localStorage.setItem('lang',lang);
}

function generatePDF(){
  const lang=document.getElementById('langSelect').value;
  const t=translations[lang];
  const seller=document.getElementById('seller').value.trim();
  const client=document.getElementById('client').value.trim();
  const date=document.getElementById('date').value.trim();
  const item=document.getElementById('item').value.trim();
  const quantity=parseFloat(document.getElementById('quantity').value);
  const price=parseFloat(document.getElementById('price').value);
  const ivaIncluded=document.getElementById('iva').checked;
  const notes=document.getElementById('notes').value.trim();

  if(!seller || !client || !date || !item || isNaN(quantity) || isNaN(price)){
    showToast(t.invalid); return;
  }

  const subtotal=quantity*price;
  const tax=ivaIncluded ? subtotal*0.21 : 0;
  const total=subtotal+tax;

  const { jsPDF }=window.jspdf;
  const doc=new jsPDF();
  doc.setFontSize(22);
  doc.text(t.invoiceTitle,105,20,null,null,'center');
  doc.setFontSize(12);
  doc.text(`${t.seller}: ${seller}`,20,35);
  doc.text(`${t.client}: ${client}`,20,45);
  doc.text(`${t.date}: ${date}`,20,55);

  doc.setLineWidth(0.5);
  doc.line(20,60,190,60);

  doc.setFontSize(12);
  doc.text(t.item,20,70);
  doc.text(t.quantity,90,70);
  doc.text(t.price,130,70);
  doc.text(t.total,170,70);

  doc.text(item,20,80);
  doc.text(quantity.toString(),90,80);
  doc.text(`$${price.toFixed(2)}`,130,80);
  doc.text(`$${(price*quantity).toFixed(2)}`,170,80);

  doc.line(20,85,190,85);
  doc.text(`${t.subtotal}: $${subtotal.toFixed(2)}`,130,95);
  if(ivaIncluded) doc.text(`${t.tax}: $${tax.toFixed(2)}`,130,105);
  doc.text(`${t.total}: $${total.toFixed(2)}`,130,115);

  if(notes){
    const splitNotes=doc.splitTextToSize(`${t.notes}: ${notes}`,170);
    doc.text(splitNotes,20,130);
  }

  const signatureY=180;
  doc.setLineWidth(0.2);
  doc.line(20,signatureY,80,signatureY);
  doc.line(120,signatureY,190,signatureY);
  doc.text(t.signatureSeller,20,signatureY+5);
  doc.text(t.signatureClient,120,signatureY+5);

  doc.save(`${t.invoiceTitle}.pdf`);
}

function copyData(){
  const lang=document.getElementById('langSelect').value;
  const t=translations[lang];
  const seller=document.getElementById('seller').value.trim();
  const client=document.getElementById('client').value.trim();
  const date=document.getElementById('date').value.trim();
  const item=document.getElementById('item').value.trim();
  const quantity=document.getElementById('quantity').value;
  const price=document.getElementById('price').value;
  const ivaIncluded=document.getElementById('iva').checked ? "Sí / Yes" : "No";
  const notes=document.getElementById('notes').value.trim();

  const text=`${t.seller}: ${seller}
${t.client}: ${client}
${t.date}: ${date}
${t.item}: ${item}
${t.quantity}: ${quantity}
${t.price}: $${price}
IVA: ${ivaIncluded}
${t.notes}: ${notes}`.trim();

  navigator.clipboard.writeText(text).then(()=>showToast(t.copyAlert));
}

document.getElementById('generateBtn').addEventListener('click',generatePDF);
document.getElementById('copyBtn').addEventListener('click',copyData);

window.onload=()=>{
  const savedLang=localStorage.getItem('lang');
  if(savedLang){
    document.getElementById('langSelect').value=savedLang;
    updateLanguage();
  } else { updateLanguage(); }
};
</script>
</body>
</html>
