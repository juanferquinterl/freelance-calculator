<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator | My Web Tools</title>
<meta name="description" content="Generate strong passwords with options for length, symbols, numbers, and uppercase letters.">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">

<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { background:#f4f6f8; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; }
.container { background:white; padding:40px 35px; border-radius:12px; box-shadow:0 15px 40px rgba(0,0,0,0.1); max-width:480px; width:100%; }
h1 { text-align:center; color:#333; margin-bottom:25px; }
label { display:block; margin-top:15px; font-weight:600; color:#555; }
input[type=number], button, select { width:100%; padding:12px; margin-top:5px; border-radius:8px; border:1px solid #ccc; font-size:16px; }
input:focus, select:focus { outline:none; border-color:#4CAF50; box-shadow:0 0 5px rgba(76,175,80,0.3); }
button { background:#4CAF50; color:white; border:none; cursor:pointer; font-weight:bold; margin-top:20px; transition:background 0.3s ease; }
button:hover { background:#43a047; }
.checkbox-group { margin-top:15px; font-size:14px; color:#555; }
.result { margin-top:25px; font-size:18px; line-height:1.6; text-align:center; word-break:break-all; }
.copy-btn { background:#2196F3; margin-top:10px; }
.copy-btn:hover { background:#1e88e5; }
.language-select { text-align:right; margin-bottom:20px; }
.footer { text-align:center; margin-top:25px; font-size:12px; color:#777; }

/* Toast notification */
#toast { position:fixed; bottom:25px; left:50%; transform:translateX(-50%); background:#333; color:white; padding:12px 20px; border-radius:8px; font-size:14px; opacity:0; pointer-events:none; transition:opacity 0.4s, transform 0.4s; z-index:1000; }
#toast.show { opacity:1; transform:translate(-50%,-10px); }
</style>
</head>

<body>
<div class="container">
  <div class="language-select">
    <select id="language" onchange="setLanguage()">
      <option value="en">English</option>
      <option value="es">Español</option>
    </select>
  </div>

  <h1 id="title">Password Generator</h1>

  <label id="labelLength">Password Length</label>
  <input type="number" id="length" placeholder="12" min="4" max="128">

  <div class="checkbox-group">
    <input type="checkbox" id="uppercase" checked> <span id="labelUppercase">Include Uppercase</span><br>
    <input type="checkbox" id="numbers" checked> <span id="labelNumbers">Include Numbers</span><br>
    <input type="checkbox" id="symbols" checked> <span id="labelSymbols">Include Symbols</span>
  </div>

  <button id="genButton" onclick="generatePassword()">Generate Password</button>

  <div class="result" id="result"></div>

  <button class="copy-btn" id="copyButton" onclick="copyPassword()">Copy Password</button>

  <div class="footer" id="footerText">Simple tool for strong passwords</div>
</div>

<div id="toast"></div>

<script>
let passwordText = "";

function generatePassword() {
  let length = Number(document.getElementById("length").value);
  let includeUpper = document.getElementById("uppercase").checked;
  let includeNumbers = document.getElementById("numbers").checked;
  let includeSymbols = document.getElementById("symbols").checked;
  let lang = document.getElementById("language").value;

  if(!length || length < 4) {
    document.getElementById("result").innerText = (lang==="es") ? "Ingresa un número válido (mínimo 4)" : "Enter a valid number (minimum 4)";
    return;
  }

  const lowerChars = "abcdefghijklmnopqrstuvwxyz";
  const upperChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const numberChars = "0123456789";
  const symbolChars = "!@#$%^&*()_+[]{}|;:,.<>?/";

  let chars = lowerChars;
  if(includeUpper) chars += upperChars;
  if(includeNumbers) chars += numberChars;
  if(includeSymbols) chars += symbolChars;

  passwordText = "";
  for(let i=0; i<length; i++){
    passwordText += chars.charAt(Math.floor(Math.random()*chars.length));
  }

  document.getElementById("result").innerText = passwordText;
}

function copyPassword() {
  if(!passwordText) return;
  navigator.clipboard.writeText(passwordText);
  let lang = document.getElementById("language").value;
  showToast(lang==="es" ? "Contraseña copiada" : "Password copied");
}

function showToast(message){
  const toast = document.getElementById("toast");
  toast.innerText = message;
  toast.classList.add("show");
  setTimeout(()=>{toast.classList.remove("show");},2000);
}

function setLanguage() {
  let lang = document.getElementById("language").value;
  localStorage.setItem("lang", lang);

  if(lang==="es") {
    document.getElementById("title").innerText = "Generador de Contraseñas";
    document.getElementById("labelLength").innerText = "Longitud de la contraseña";
    document.getElementById("labelUppercase").innerText = "Incluir mayúsculas";
    document.getElementById("labelNumbers").innerText = "Incluir números";
    document.getElementById("labelSymbols").innerText = "Incluir símbolos";
    document.getElementById("genButton").innerText = "Generar contraseña";
    document.getElementById("copyButton").innerText = "Copiar contraseña";
    document.getElementById("footerText").innerText = "Herramienta simple para contraseñas seguras";
  } else {
    document.getElementById("title").innerText = "Password Generator";
    document.getElementById("labelLength").innerText = "Password Length";
    document.getElementById("labelUppercase").innerText = "Include Uppercase";
    document.getElementById("labelNumbers").innerText = "Include Numbers";
    document.getElementById("labelSymbols").innerText = "Include Symbols";
    document.getElementById("genButton").innerText = "Generate Password";
    document.getElementById("copyButton").innerText = "Copy Password";
    document.getElementById("footerText").innerText = "Simple tool for strong passwords";
  }
}

window.onload = function(){
  let savedLang = localStorage.getItem("lang");
  if(savedLang){
    document.getElementById("language").value = savedLang;
    setLanguage();
  }
};
</script>
</body>
</html>
