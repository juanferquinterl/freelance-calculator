<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freelance Rate Calculator | My Web Tools</title>
<meta name="description" content="Calculate your ideal freelance hourly rate based on income, expenses, and hours worked.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<style>
/* Reset y tipografía */
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { background: #f4f6f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
.container { background: #fff; padding: 40px 35px; border-radius: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); max-width: 480px; width: 100%; }
h1 { text-align: center; color: #333; margin-bottom: 25px; }
label { display: block; margin-top: 15px; font-weight: 600; color: #555; }
input, select, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
input:focus, select:focus { outline: none; border-color: #4CAF50; box-shadow: 0 0 5px rgba(76,175,80,0.3); }
button { background: #4CAF50; color: #fff; border: none; cursor: pointer; font-weight: bold; transition: background 0.3s ease; margin-top: 20px; }
button:hover { background: #43a047; }
.result { margin-top: 25px; font-size: 18px; line-height: 1.6; text-align: center; }
.copy-btn { background: #2196F3; margin-top: 10px; }
.copy-btn:hover { background: #1e88e5; }
.language-select { text-align: right; margin-bottom: 20px; }
.footer { text-align: center; margin-top: 25px; font-size: 12px; color: #777; }

/* Toast moderno */
#toast {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: white;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 14px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s, transform 0.4s;
  z-index: 1000;
}
#toast.show { opacity: 1; transform: translate(-50%, -10px); }
</style>
</head>

<body>
<div class="container">
  <div class="language-select">
    <select id="language" onchange="setLanguage()">
      <option value="en">English</option>
      <option value="es">Español</option>
    </select>
  </div>

  <h1 id="title">Freelance Rate Calculator</h1>

  <label id="labelIncome">Desired Monthly Income ($)</label>
  <input type="number" id="income" placeholder="4000">

  <label id="labelExpenses">Monthly Expenses ($)</label>
  <input type="number" id="expenses" placeholder="1000">

  <label id="labelHours">Hours per week</label>
  <input type="number" id="hours" placeholder="40">

  <button id="calcButton" onclick="calculate()">Calculate Rate</button>

  <div class="result" id="result"></div>

  <button class="copy-btn" id="copyButton" onclick="copyResult()">Copy Result</button>

  <div class="footer" id="footerText">Simple tool for freelancers</div>
</div>

<div id="toast"></div>

<script>
let resultText = "";

function calculate() {
  let income = Number(document.getElementById("income").value);
  let expenses = Number(document.getElementById("expenses").value);
  let hours = Number(document.getElementById("hours").value);
  let lang = document.getElementById("language").value;

  if(!income || !hours) {
    document.getElementById("result").innerHTML = (lang==="es") ? "Por favor completa los campos necesarios" : "Please fill required fields";
    return;
  }

  let monthlyGoal = income + expenses;
  let monthlyHours = hours * 4;
  let yearlyIncome = monthlyGoal * 12;
  let rate = monthlyGoal / monthlyHours;

  if(lang === "es") {
    resultText = `Tarifa por hora: $${rate.toFixed(2)}<br>Objetivo mensual: $${monthlyGoal}<br>Objetivo anual: $${yearlyIncome}`;
  } else {
    resultText = `Hourly Rate: $${rate.toFixed(2)}<br>Monthly Goal: $${monthlyGoal}<br>Yearly Target: $${yearlyIncome}`;
  }

  document.getElementById("result").innerHTML = resultText;
}

function copyResult() {
  if(!resultText) return;
  navigator.clipboard.writeText(resultText.replace(/<br>/g,"\n"));
  let lang = document.getElementById("language").value;
  showToast(lang==="es" ? "Resultado copiado" : "Result copied");
}

function showToast(message) {
  const toast = document.getElementById("toast");
  toast.innerText = message;
  toast.classList.add("show");
  setTimeout(()=>{toast.classList.remove("show");}, 2000);
}

function setLanguage() {
  let lang = document.getElementById("language").value;
  localStorage.setItem("lang", lang);

  if(lang==="es") {
    document.getElementById("title").innerText = "Calculadora de Tarifas Freelance";
    document.getElementById("labelIncome").innerText = "Ingreso mensual deseado ($)";
    document.getElementById("labelExpenses").innerText = "Gastos mensuales ($)";
    document.getElementById("labelHours").innerText = "Horas por semana";
    document.getElementById("calcButton").innerText = "Calcular tarifa";
    document.getElementById("copyButton").innerText = "Copiar resultado";
    document.getElementById("footerText").innerText = "Herramienta simple para freelancers";
  } else {
    document.getElementById("title").innerText = "Freelance Rate Calculator";
    document.getElementById("labelIncome").innerText = "Desired Monthly Income ($)";
    document.getElementById("labelExpenses").innerText = "Monthly Expenses ($)";
    document.getElementById("labelHours").innerText = "Hours per week";
    document.getElementById("calcButton").innerText = "Calculate Rate";
    document.getElementById("copyButton").innerText = "Copy Result";
    document.getElementById("footerText").innerText = "Simple tool for freelancers";
  }
}

window.onload = function() {
  let savedLang = localStorage.getItem("lang");
  if(savedLang){
    document.getElementById("language").value = savedLang;
    setLanguage();
  }
};
</script>
</body>
</html>
